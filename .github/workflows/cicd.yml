name: The Dot Resource Matcher CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ─── CONTINUOUS INTEGRATION (CI) ───
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8

    - name: Lint code for critical syntax errors
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  # ─── CONTINUOUS DEPLOYMENT (CD) ───
  deploy-to-huggingface:
    needs: validate-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Push codebase straight to Hugging Face Spaces
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        # Houni baddal l'espace b esm el Space mta3ek (Zeyd123/The_Dot walla Zeyd-dev/the_dot) 
        git remote add hf https://Zeyd-dev:$HF_TOKEN@huggingface.co/spaces/Zeyd123/The_Dot
        git push hf main --force