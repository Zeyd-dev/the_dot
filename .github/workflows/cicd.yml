name: The Dot Resource Matcher CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # ─── CONTINUOUS INTEGRATION (CI) ───
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8

    - name: Lint code for critical syntax errors
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats formatting style issues as warnings instead of breaking the build
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # ─── CONTINUOUS DEPLOYMENT (CD) ───
  deploy-docker:
    needs: validate-and-test
    runs-on: ubuntu-latest
    # Only deploy when pushing directly to the main branch
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/dot-resource-matcher:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/dot-resource-matcher:${{ github.sha }}